---
- name: Update DNS records for Website
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../vault/cloudflare/vault.yml
  tasks:
    - name: Update DNS records for Website
      community.general.cloudflare_dns:
        zone: anneraud.fr
        account_email: "{{ cloudflare_email }}"
        account_api_key: "{{ cloudflare_api_key }}"
        type: CNAME
        record: www.anneraud.fr
        value: "alixanneraud.github.io"

    - name: Update DNS records for Website
      community.general.cloudflare_dns:
        zone: anneraud.fr
        account_email: "{{ cloudflare_email }}"
        account_api_key: "{{ cloudflare_api_key }}"
        type: CNAME
        record: anneraud.fr
        value: www.anneraud.fr
